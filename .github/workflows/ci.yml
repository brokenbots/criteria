name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache Go build cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: go-build-lint-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-build-lint-${{ runner.os }}-

      - name: Sync workspace
        run: go work sync

      - name: Enforce import boundaries
        run: make lint-imports

      - name: Lint Go (golangci-lint)
        run: make lint-go

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache Go build cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: go-build-unit-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-build-unit-${{ runner.os }}-

      - name: Sync workspace
        run: go work sync

      - name: Run tests (root + sdk + workflow)
        run: |
          go test -race -count=2 ./...
          (cd sdk      && go test -race -count=2 ./...)
          (cd workflow && go test -race -count=2 ./...)

      - name: Run conformance tests
        run: make test-conformance

  e2e:
    name: Build & E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache Go build cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: go-build-e2e-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-build-e2e-${{ runner.os }}-

      - name: Sync workspace
        run: go work sync

      - name: Build binary
        run: make build

      - name: CLI smoke test
        run: ./bin/criteria apply examples/hello.hcl --events-file /tmp/events.ndjson

      - name: Validate example workflows
        run: make validate

      - name: Run example plugin end-to-end
        run: make example-plugin

  proto-drift:
    name: Proto drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint proto files
        run: buf lint
        continue-on-error: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check proto drift
        run: make proto-check-drift
