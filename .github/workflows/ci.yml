name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache Go build cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: go-build-lint-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-build-lint-${{ runner.os }}-

      - name: Sync workspace
        run: go work sync

      - name: Enforce import boundaries
        run: make lint-imports

      - name: Lint Go (golangci-lint)
        run: make lint-go

      - name: Lint baseline cap check
        run: make lint-baseline-check

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache Go build cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: go-build-unit-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-build-unit-${{ runner.os }}-

      - name: Sync workspace
        run: go work sync

      - name: Run tests (root + sdk + workflow)
        run: |
          go test -race -count=2 ./...
          (cd sdk      && go test -race -count=2 ./...)
          (cd workflow && go test -race -count=2 ./...)

      - name: Run conformance tests
        run: make test-conformance

  e2e:
    name: Build & E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache Go build cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: go-build-e2e-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-build-e2e-${{ runner.os }}-

      - name: Sync workspace
        run: go work sync

      - name: Build binary
        run: make build

      - name: CLI smoke test
        run: ./bin/criteria apply examples/hello.hcl --events-file /tmp/events.ndjson

      - name: Validate example workflows
        run: make validate

      - name: Run example plugin end-to-end
        run: make example-plugin

  proto-drift:
    name: Proto drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint proto files
        run: buf lint
        continue-on-error: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check proto drift
        run: make proto-check-drift

  release-artifacts:
    name: Release artifacts (RC PRs only)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' && (
        startsWith(github.head_ref, 'release/') ||
        contains(github.event.pull_request.title, '-rc')
      )
    needs: [unit-tests, e2e]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Sync workspace
        run: go work sync

      - name: Extract RC tag from branch or title
        id: rc
        run: |
          # 1. Prefer the branch name (release/<tag>).
          tag=""
          if [[ "${GITHUB_HEAD_REF}" == release/* ]]; then
            tag="${GITHUB_HEAD_REF#release/}"
          fi
          # 2. Title: match a full semver+rc token (e.g. v0.3.0-rc1). The -rcN suffix is required.
          if [[ -z "$tag" ]]; then
            tag="$(echo "${PR_TITLE}" | grep -oE 'v?[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+' | head -1 || true)"
          fi
          # 3. Title fallback: extract just the rcN marker from any -rcN substring.
          if [[ -z "$tag" ]]; then
            tag="$(echo "${PR_TITLE}" | grep -oE -- '-rc[0-9]+' | head -1 | sed 's/^-//' || true)"
          fi
          if [[ -z "$tag" ]]; then
            echo "ERROR: could not extract RC tag from branch or title"
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}

      - name: Build CLI binary
        run: make build

      - name: Build adapter plugins
        run: make plugins

      - name: Build runtime container image
        run: make docker-runtime

      - name: Save runtime image as tar
        run: |
          docker save criteria/runtime:dev -o bin/criteria-runtime.tar

      - name: Generate SHA256SUMS
        working-directory: bin
        run: sha256sum criteria criteria-adapter-* criteria-runtime.tar > SHA256SUMS

      - name: Bundle artifacts
        run: |
          mkdir -p artifact
          cp bin/criteria bin/criteria-adapter-* bin/criteria-runtime.tar bin/SHA256SUMS artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: criteria-${{ steps.rc.outputs.tag }}
          path: artifact/
          retention-days: 30
          if-no-files-found: error
