issues:
  exclude-rules:
    # --- Deferred complexity (gocognit/funlen/gocyclo) â€” addressed by sibling workstreams ---
    - path: compile_nodes.go
      linters:
        - gocognit
      text: '`compileWaits`' # W04: compileWaits extracted from Compile
    - path: compile_nodes.go
      linters:
        - gocognit
      text: '`compileBranches`' # W04: compileBranches extracted from Compile
    - path: compile_nodes.go
      linters:
        - gocognit
      text: '`compileForEachs`' # W04: compileForEachs extracted from Compile
    - path: compile_nodes.go
      linters:
        - funlen
      text: 'Function ''compileBranches''' # W04: compileBranches extracted from Compile
    - path: compile_nodes.go
      linters:
        - funlen
      text: 'Function ''compileForEachs''' # W04: compileForEachs extracted from Compile
    - path: compile_nodes.go
      linters:
        - gocyclo
      text: '`compileBranches`' # W04: compileBranches extracted from Compile
    - path: compile_nodes.go
      linters:
        - gocyclo
      text: '`compileForEachs`' # W04: compileForEachs extracted from Compile
    - path: compile.go
      linters:
        - gocognit
      text: '`resolveTransitions`' # W04: resolveTransitions extracted from Compile
    - path: compile.go
      linters:
        - gocognit
      text: '`checkReachability`' # W04: checkReachability extracted from Compile
    - path: compile.go
      linters:
        - funlen
      text: 'Function ''resolveTransitions''' # W04: resolveTransitions extracted from Compile
    - path: compile.go
      linters:
        - funlen
      text: 'Function ''checkReachability''' # W04: checkReachability extracted from Compile
    - path: compile.go
      linters:
        - gocyclo
      text: '`resolveTransitions`' # W04: resolveTransitions extracted from Compile
    - path: compile.go
      linters:
        - gocyclo
      text: '`checkReachability`' # W04: checkReachability extracted from Compile
    - path: eval.go
      linters:
        - gocognit
      text: '`SerializeVarScope`' # W10: cursor-stack serialisation added complexity
    - path: eval.go
      linters:
        - gocyclo
      text: '`SerializeVarScope`' # W10: cursor-stack serialisation added complexity
    - path: eval.go
      linters:
        - funlen
      text: 'Function ''SerializeVarScope''' # W10: cursor-stack serialisation added length
    # --- kept gocritic hugeParam: applyOptions threads through 6 apply-command functions; converting to pointer requires W02-split-cli-apply scope ---
    - path: internal/cli/apply.go
      linters:
        - gocritic
      text: 'hugeParam: opts is heavy \(208 bytes\); consider passing it by pointer' # kept: applyOptions threads through 6 apply-command functions; W02-split-cli-apply owns the refactor
    # --- W13: contextcheck findings from subworkflow resolution (uses context.Background() inside compileSubworkflows) ---
    - path: internal/cli/apply_setup.go
      linters:
        - contextcheck
      text: 'should pass the context parameter'
    - path: internal/cli/compile.go
      linters:
        - contextcheck
      text: 'should pass the context parameter'
    - path: internal/cli/reattach.go
      linters:
        - contextcheck
      text: 'should pass the context parameter'
    # --- W13: gocognit and funlen complexity in compileSubworkflows (cycle detection, multi-file parsing, validation) ---
    - path: .*compile_subworkflows\.go
      linters:
        - gocognit
      text: '`compileSubworkflows`'
    - path: .*compile_subworkflows\.go
      linters:
        - funlen
      text: 'compileSubworkflows'
