issues:
  exclude-rules:
    # --- Deferred complexity (gocognit/funlen/gocyclo) — addressed by sibling workstreams ---
    - path: compile_nodes.go
      linters:
        - gocognit
      text: '`compileWaits`' # W04: compileWaits extracted from Compile
    - path: compile_nodes.go
      linters:
        - gocognit
      text: '`compileForEachs`' # W04: compileForEachs extracted from Compile
    - path: compile_nodes.go
      linters:
        - funlen
      text: 'Function ''compileForEachs''' # W04: compileForEachs extracted from Compile
    - path: compile_nodes.go
      linters:
        - gocyclo
      text: '`compileForEachs`' # W04: compileForEachs extracted from Compile
    - path: compile.go
      linters:
        - gocognit
      text: '`resolveTransitions`' # W04: resolveTransitions extracted from Compile
    - path: compile.go
      linters:
        - funlen
      text: 'Function ''resolveTransitions''' # W04: resolveTransitions extracted from Compile
    - path: compile.go
      linters:
        - gocyclo
      text: '`resolveTransitions`' # W04: resolveTransitions extracted from Compile
    - path: eval.go
      linters:
        - gocognit
      text: '`SerializeVarScope`' # W10: cursor-stack serialisation added complexity
    - path: eval.go
      linters:
        - gocyclo
      text: '`SerializeVarScope`' # W10: cursor-stack serialisation added complexity
    - path: eval.go
      linters:
        - funlen
      text: 'Function ''SerializeVarScope''' # W10: cursor-stack serialisation added length
    # --- kept gocritic hugeParam: applyOptions threads through 6 apply-command functions; converting to pointer requires W02-split-cli-apply scope ---
    - path: internal/cli/apply.go
      linters:
        - gocritic
      text: 'hugeParam: opts is heavy \(232 bytes\); consider passing it by pointer' # W13: applyOptions grew to 232 bytes when subworkflowRoots []string was added; by-pointer conversion is W02-split-cli-apply scope
    # --- W16: nodeTargets gocognit: grew from 21 to 22 when switch case was added alongside steps/waits/approvals ---
    - path: compile_steps_graph.go
      linters:
        - gocognit
      text: '`nodeTargets`' # W16: switch case added; full refactor is out of scope for this workstream
    # --- W16: compileSwitchConditionBlock funlen: 55-line function validates attrs, match, next, and output for a condition block ---
    - path: compile_switches.go
      linters:
        - funlen
      text: 'compileSwitchConditionBlock' # W16: each logical phase is necessary; further splitting would obscure intent
    # --- Step 1 rename fix: lifecycle_test.go -> lifecycle.go moved test functions into production, increasing baseline ---
    - path: .*conformance/lifecycle.go
      linters:
        - gocognit
      text: '`testAdapterSessionEventsRoundTrip`' # W12: SDK conformance test for adapter lifecycle round-trip events; high complexity from exhaustive event validation
    - path: .*conformance/lifecycle.go
      linters:
        - funlen
      text: 'testAdapterSessionEventsOrdered' # W12: SDK conformance test for event ordering; 41-line function validates state machine and ordering invariants
    - path: .*conformance/lifecycle.go
      linters:
        - funlen
      text: 'testAdapterSessionEventsRoundTrip' # W12: SDK conformance test; 48-line function validates round-trip events exhaustively
    # --- td-02: structural suppressions moved from inline nolint directives ---
    # kept: Run and RunPlugin are public API exported by the conformance package; converting opts to *Options would require every external caller to pass an address
    - path: internal/adapter/conformance/conformance\.go
      linters:
        - gocritic
      text: 'hugeParam: opts is heavy \(80 bytes\); consider passing it by pointer' # td-02: public API value receiver; pointer conversion would break all external conformance test callers
    # kept: testConcurrentSessions opens two full plugin sessions in parallel goroutines; the setup/teardown scaffolding is inherently long and cannot be sensibly split without obscuring the concurrency test intent
    - path: internal/adapter/conformance/conformance_lifecycle\.go
      linters:
        - funlen
      text: 'Function ''testConcurrentSessions''' # td-02: 55-statement test requiring full lifecycle scaffold for two parallel sessions; splitting degrades readability
    # kept: runApplyLocal orchestrates engine creation, event routing, signal handling, and output rendering for the local apply path; the individual phases are already minimal and splitting would scatter the flow
    - path: internal/cli/apply_local\.go
      linters:
        - funlen
      text: 'Function ''runApplyLocal''' # td-02: 41-statement apply orchestrator; converting applyOptions to pointer is W02-split-cli-apply scope
    # kept: applyOptions is a 232-byte struct that threads through the apply pipeline; converting to pointer is W02-split-cli-apply scope and not safe to do piecemeal
    - path: internal/cli/apply_local\.go
      linters:
        - gocritic
      text: 'hugeParam: opts is heavy \(232 bytes\); consider passing it by pointer' # td-02: applyOptions grew to 232 bytes; by-pointer conversion is W02-split-cli-apply scope
    - path: internal/cli/apply_resume\.go
      linters:
        - gocritic
      text: 'hugeParam: opts is heavy \(232 bytes\); consider passing it by pointer' # td-02: applyOptions passed by value; by-pointer conversion is W02-split-cli-apply scope
    - path: internal/cli/apply_server\.go
      linters:
        - gocritic
      text: 'hugeParam: opts is heavy \(232 bytes\); consider passing it by pointer' # td-02: applyOptions passed by value across 4 server-apply functions; by-pointer conversion is W02-split-cli-apply scope
