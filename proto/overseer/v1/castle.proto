// CastleService — read/control RPCs served by Castle and consumed by Parapet
// (and any human tooling such as grpcurl).
syntax = "proto3";

package overseer.v1;

import "google/protobuf/timestamp.proto";
import "overseer/v1/events.proto";
import "overseer/v1/overseer.proto";

option go_package = "github.com/brokenbots/overseer/sdk/pb/overseer/v1;overseerv1";

service CastleService {
  rpc ListOverseers(ListOverseersRequest) returns (ListOverseersResponse);
  rpc GetOverseer(GetOverseerRequest) returns (Overseer);

  rpc ListRuns(ListRunsRequest) returns (ListRunsResponse);
  rpc GetRun(GetRunRequest) returns (Run);

  // ListRunEvents replaces the Phase 0 run-events HTTP endpoint.
  rpc ListRunEvents(ListRunEventsRequest) returns (ListRunEventsResponse);

  // WatchRun replaces the Phase 0 run-stream endpoint. Emits any already
  // persisted events (since `since_seq`) and then tails live events until the
  // client disconnects or the run reaches a terminal state.
  rpc WatchRun(WatchRunRequest) returns (stream Envelope);

  // StopRun cancels a run. If an Overseer is attached to the run via its
  // Control stream, the orchestrator pushes a RunCancel to it. Returns
  // FAILED_PRECONDITION if the Overseer is not connected.
  //
  // Implementations MUST reject the request with PERMISSION_DENIED if the
  // authenticated caller does not own the target run's overseer.
  rpc StopRun(StopRunRequest) returns (StopRunResponse);

  // SendPrompt — schema-only stub for Phase 2.3. Parapet can wire up UI
  // against this method, but Castle currently returns UNIMPLEMENTED.
  rpc SendPrompt(SendPromptRequest) returns (SendPromptResponse);
}

// --- Overseer read types ---

message Overseer {
  string overseer_id = 1;
  string name = 2;
  map<string, string> labels = 3;
  string status = 4; // "online" | "offline"
  google.protobuf.Timestamp registered_at = 5;
  google.protobuf.Timestamp last_seen_at = 6;
}

message ListOverseersRequest {
  int32 limit = 1;
  string page_token = 2;
}

message ListOverseersResponse {
  repeated Overseer overseers = 1;
  string next_page_token = 2;
}

message GetOverseerRequest {
  string overseer_id = 1;
}

// --- Run read types ---

message ListRunsRequest {
  string overseer_id = 1; // optional filter
  string status = 2;      // optional filter
  int32 limit = 3;
  string page_token = 4;
}

message ListRunsResponse {
  repeated Run runs = 1;
  string next_page_token = 2;
}

message GetRunRequest {
  string run_id = 1;
}

// --- Event read/watch types ---

message ListRunEventsRequest {
  string run_id = 1;
  uint64 since_seq = 2; // exclusive
  int32 limit = 3;
}

message ListRunEventsResponse {
  repeated Envelope events = 1;
  uint64 last_seq = 2;
  // Continuation cursor. When set, pass this as since_seq in the next call.
  uint64 next_since_seq = 3;
}

message WatchRunRequest {
  string run_id = 1;
  uint64 since_seq = 2; // exclusive; 0 streams from the beginning
  string subscriber_id = 3; // optional durable cursor key scoped by run_id
}

// --- Run control types ---

message StopRunRequest {
  string run_id = 1;
  string reason = 2;
}

message StopRunResponse {
  // ServerTime when the cancel was issued; the run may still take time to
  // observe and react to the cancel.
  google.protobuf.Timestamp issued_at = 1;
}

message SendPromptRequest {
  string run_id = 1;
  string step = 2;
  string prompt = 3;
}

message SendPromptResponse {
  google.protobuf.Timestamp issued_at = 1;
}
