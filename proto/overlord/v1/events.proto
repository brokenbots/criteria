// Overlord event schema.
//
// The `Envelope` message is the wire format for every event flowing between
// Overseer, Castle, and Parapet. Field numbers in `payload` are **stable** once
// assigned — see WORKSTREAM Phase 1.1 §3.1. A new event type must use the next
// unused field number and never reuse an old one.
syntax = "proto3";

package overlord.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/brokenbots/overlord/shared/pb/overlord/v1;overlordv1";

// Envelope is the wire format for every event.
message Envelope {
  // Protocol version. Always 1 for this package; bump only with a new
  // `overlord.vN` package.
  int32 schema_version = 1;

  // Run the event belongs to.
  string run_id = 2;

  // Castle-assigned monotonic sequence number per run_id. 0 when an Overseer
  // submits; Castle stamps the real value before persistence and fan-out.
  uint64 seq = 3;

  // Event timestamp (UTC).
  google.protobuf.Timestamp ts = 4;

  // Optional correlation id used to match a SubmitEvents envelope with its Ack.
  string correlation_id = 5;

  // Typed payload. Field numbers here are permanent.
  oneof payload {
    RunStarted run_started = 10;
    RunCompleted run_completed = 11;
    RunFailed run_failed = 12;
    StepEntered step_entered = 13;
    StepOutcome step_outcome = 14;
    StepTransition step_transition = 15;
    StepLog step_log = 16;
    AdapterEvent adapter_event = 17;
    OverseerHeartbeat overseer_heartbeat = 18;
    OverseerDisconnected overseer_disconnected = 19;
    StepResumed step_resumed = 20;
    // WatchReady is a protocol-level sentinel sent once at the start of a
    // WatchRun server-stream, after any persisted-event replay, to flush
    // response headers so the client's WatchRun call can return. It has no
    // associated run state; clients MUST ignore it.
    WatchReady watch_ready = 99;
  }
}

// RunStarted — a run has begun executing.
message RunStarted {
  string workflow_name = 1;
  string initial_step = 2;
}

// RunCompleted — a run reached a terminal state successfully.
message RunCompleted {
  string final_state = 1;
  bool success = 2;
}

// RunFailed — a run ended in a terminal failure.
message RunFailed {
  string reason = 1;
  string step = 2;
}

// StepEntered — the engine began executing a step.
message StepEntered {
  string step = 1;
  string adapter = 2;
  int32 attempt = 3;
}

// StepOutcome — a step finished with a named outcome (or error).
message StepOutcome {
  string step = 1;
  string outcome = 2;
  int64 duration_ms = 3;
  string error = 4;
}

// StepTransition — the FSM moved from one node to another via an outcome.
message StepTransition {
  string from = 1;
  string to = 2;
  string via_outcome = 3;
}

// LogStream identifies which stream a StepLog chunk came from.
enum LogStream {
  LOG_STREAM_UNSPECIFIED = 0;
  LOG_STREAM_STDOUT = 1;
  LOG_STREAM_STDERR = 2;
  LOG_STREAM_AGENT = 3;
}

// StepLog — a chunk of log output from a running step.
message StepLog {
  string step = 1;
  LogStream stream = 2;
  string chunk = 3;
}

// AdapterEvent — adapter-specific structured event.
//
// On-wire contract for `data`: adapter sinks SHOULD emit JSON objects
// (top-level `{}`). For backward compatibility with Phase 0 adapters that
// emitted scalars or arrays, the Overseer transport wraps non-object
// payloads under a `value` key before conversion to Struct (e.g. the
// wire payload for the array `[1,2,3]` becomes `{"value": [1,2,3]}`).
// Subscribers MUST tolerate the wrapped shape. New adapters SHOULD
// produce object payloads and avoid relying on the wrapping.
message AdapterEvent {
  string step = 1;
  string adapter = 2;
  string kind = 3;
  google.protobuf.Struct data = 4;
}

// OverseerHeartbeat — periodic liveness signal from an Overseer.
message OverseerHeartbeat {
  string overseer_id = 1;
}

// OverseerDisconnected — Castle observed the Overseer going away.
message OverseerDisconnected {
  string overseer_id = 1;
  string reason = 2;
}

// StepResumed is emitted by an Overseer before re-executing a step after a
// crash. It distinguishes a crash-restart rerun from a normal retry after a
// step failure. Castle stores and fans out this event identically to other
// envelopes; it has no run-status side-effects.
message StepResumed {
  string step = 1;
  int32 attempt = 2;
  string reason = 3;
}

// WatchReady is a protocol-level sentinel payload sent by WatchRun once at
// stream start. It has no fields and no run-semantic meaning; it exists
// solely to flush Connect server-stream response headers so the client's
// WatchRun call can return before any real event is published.
message WatchReady {
}
